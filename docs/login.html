<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delicious | 로그인</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="icon" href="./favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aibe-7th.github.io/delicious/login.html" />
    <meta property="og:title" content="Delicious | 로그인" />
    <meta property="og:description" content="오늘의 맛집을 기록하고 공유해보세요. 내 맛집이 모두의 맛집으로!" />
    <meta property="og:image" content="https://aibe-7th.github.io/delicious/preview.jpg" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="400" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aibe-7th.github.io/delicious/login.html" />
    <meta property="twitter:title" content="Delicious | 로그인" />
    <meta property="twitter:description" content="오늘의 맛집을 기록하고 공유해보세요. 내 맛집이 모두의 맛집으로!" />
    <meta property="twitter:image" content="https://aibe-7th.github.io/delicious/preview.jpg" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-panel">
        <a class="brand-link" href="./index.html">Delicious</a>
        <h1>로그인</h1>
        <form id="loginForm" class="vstack gap-3">
          <input
            class="form-control form-control-lg"
            name="email"
            type="email"
            placeholder="이메일"
            required
          />
          <input
            class="form-control form-control-lg"
            name="password"
            type="password"
            minlength="6"
            placeholder="비밀번호"
            required
          />
          <button class="btn btn-dark btn-lg" type="submit">로그인</button>
        </form>
        <div class="auth-divider">또는</div>
        <!--
          data-provider: signInWithOAuth에 전달하는 provider 식별자.
          google는 Supabase 내장 provider, custom:kakao는 Custom OIDC provider 식별자.
          (custom:kakao는 Supabase 대시보드 Custom Providers에 등록한 값과 일치해야 함)
        -->
        <div class="social-actions">
          <button class="social-button google" data-provider="google" type="button">
            <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="#4285f4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34a853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#fbbc05"
                d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"
              />
              <path
                fill="#ea4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.3 9.14 5.38 12 5.38z"
              />
            </svg>
            Google로 계속하기
          </button>
          <button class="social-button kakao" data-provider="custom:kakao" type="button">
            <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="#191600"
                d="M12 3.5c5.25 0 9.5 3.35 9.5 7.48 0 4.12-4.25 7.47-9.5 7.47-.54 0-1.07-.04-1.59-.11l-4.08 2.67c-.43.28-.98-.11-.84-.6l1.03-3.54C4.07 15.5 2.5 13.38 2.5 10.98 2.5 6.85 6.75 3.5 12 3.5z"
              />
            </svg>
            Kakao로 계속하기
          </button>
        </div>
        <a class="sub-link" href="./signup.html">계정 만들기</a>
      </section>
    </main>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <script type="module" src="./js/login.js"></script>
  </body>
</html>
