<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delicious | 로그인</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-panel">
        <a class="brand-link" href="./index.html">Delicious</a>
        <h1>로그인</h1>
        <form id="loginForm" class="vstack gap-3">
          <input
            class="form-control form-control-lg"
            name="email"
            type="email"
            placeholder="이메일"
            required
          />
          <input
            class="form-control form-control-lg"
            name="password"
            type="password"
            minlength="6"
            placeholder="비밀번호"
            required
          />
          <button class="btn btn-dark btn-lg" type="submit">로그인</button>
        </form>
        <a class="sub-link" href="./signup.html">계정 만들기</a>
      </section>
    </main>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <script type="module" src="./js/login.js"></script>
  </body>
</html>
