<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delicious | 마이페이지</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="icon" href="./favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aibe-7th.github.io/delicious/mypage.html" />
    <meta property="og:title" content="Delicious | 마이페이지" />
    <meta property="og:description" content="오늘의 맛집을 기록하고 공유해보세요. 내 맛집이 모두의 맛집으로!" />
    <meta property="og:image" content="https://aibe-7th.github.io/delicious/preview.jpg" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="400" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aibe-7th.github.io/delicious/mypage.html" />
    <meta property="twitter:title" content="Delicious | 마이페이지" />
    <meta property="twitter:description" content="오늘의 맛집을 기록하고 공유해보세요. 내 맛집이 모두의 맛집으로!" />
    <meta property="twitter:image" content="https://aibe-7th.github.io/delicious/preview.jpg" />
  </head>
  <body>
    <nav class="site-nav sticky-top border-bottom">
      <div class="container nav-inner">
        <a class="navbar-brand fw-bold" href="./index.html">Delicious</a>
        <div class="nav-actions">
          <a class="nav-link" href="./index.html">메인</a>
        </div>
      </div>
    </nav>

    <main class="auth-layout">
      <section class="write-panel">
        <h1>마이페이지</h1>

        <section class="mypage-section">
          <h2 class="mypage-heading">내 정보</h2>
          <dl class="row align-items-center gy-3 mb-0 mypage-info">
            <dt class="col-4 col-sm-3">닉네임</dt>
            <dd class="col-8 col-sm-9">
              <form class="mypage-nickname" id="nicknameForm">
                <input
                  class="form-control"
                  id="nicknameInput"
                  maxlength="20"
                  placeholder="닉네임"
                />
                <button class="btn btn-success" type="submit">저장</button>
              </form>
            </dd>
            <dt class="col-4 col-sm-3">식별자</dt>
            <dd class="col-8 col-sm-9" id="infoIdentifier">-</dd>
            <dt class="col-4 col-sm-3">로그인 수단</dt>
            <dd class="col-8 col-sm-9" id="infoProvider">-</dd>
            <dt class="col-4 col-sm-3">가입일</dt>
            <dd class="col-8 col-sm-9" id="infoJoinedAt">-</dd>
          </dl>
        </section>

        <section class="mypage-section">
          <h2 class="mypage-heading">작성한 글</h2>
          <div id="myReviews"></div>
        </section>

        <section class="mypage-section">
          <h2 class="mypage-heading">작성한 댓글</h2>
          <div id="myComments"></div>
        </section>

        <section>
          <h2 class="mypage-heading">계정</h2>
          <div class="d-flex gap-2">
            <button
              class="btn btn-outline-secondary"
              id="logoutButton"
              type="button"
            >
              로그아웃
            </button>
            <button
              class="btn btn-outline-danger"
              id="deleteAccountButton"
              type="button"
            >
              회원 탈퇴
            </button>
          </div>
        </section>
      </section>
    </main>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <script type="module" src="./js/mypage.js"></script>
  </body>
</html>
