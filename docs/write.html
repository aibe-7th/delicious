<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delicious | 리뷰 작성</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <nav class="site-nav sticky-top border-bottom">
      <div class="container nav-inner">
        <a class="navbar-brand fw-bold" href="./index.html">Delicious</a>
        <div class="nav-actions">
          <a class="nav-link" href="./index.html">목록</a>
          <span class="status-pill d-none" id="sessionText"></span>
        </div>
      </div>
    </nav>

    <main class="auth-layout">
      <section class="write-panel">
        <h1 id="formTitle">리뷰 작성</h1>
        <form id="reviewForm">
          <input type="hidden" id="reviewId" name="reviewId" />
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="title">제목</label>
              <input
                class="form-control"
                id="title"
                name="title"
                placeholder="예: 다시 가고 싶은 연남동 파스타집"
                required
              />
            </div>
            <div class="col-12">
              <label class="form-label" for="restaurantName">상호명</label>
              <input
                class="form-control"
                id="restaurantName"
                name="restaurantName"
                placeholder="예: 딜리셔스 키친"
                required
              />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="latitude">위도</label>
              <input
                class="form-control"
                id="latitude"
                name="latitude"
                type="number"
                step="0.0000001"
                min="-90"
                max="90"
                placeholder="예: 37.5665000"
                required
              />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="longitude">경도</label>
              <input
                class="form-control"
                id="longitude"
                name="longitude"
                type="number"
                step="0.0000001"
                min="-180"
                max="180"
                placeholder="예: 126.9780000"
                required
              />
            </div>
            <div class="col-12">
              <label class="form-label" for="content">리뷰</label>
              <textarea
                class="form-control"
                id="content"
                name="content"
                rows="9"
                placeholder="음식, 분위기, 가격, 다시 방문하고 싶은 이유를 남겨주세요."
                required
              ></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-success btn-lg" type="submit">저장</button>
            <a class="btn btn-outline-secondary btn-lg" href="./index.html">
              취소
            </a>
          </div>
        </form>
      </section>
    </main>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <script type="module" src="./js/write.js"></script>
  </body>
</html>
