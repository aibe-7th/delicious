<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delicious | 리뷰 작성</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <nav class="site-nav sticky-top border-bottom">
      <div class="container nav-inner">
        <a class="navbar-brand fw-bold" href="./index.html">Delicious</a>
        <div class="nav-actions">
          <a class="nav-link" href="./index.html">목록</a>
          <span class="status-pill d-none" id="sessionText"></span>
        </div>
      </div>
    </nav>

    <main class="auth-layout">
      <section class="write-panel">
        <h1 id="formTitle">리뷰 작성</h1>
        <form id="reviewForm">
          <input type="hidden" id="reviewId" name="reviewId" />
          <input type="hidden" id="latitude" name="latitude" />
          <input type="hidden" id="longitude" name="longitude" />
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="title">제목</label>
              <input
                class="form-control"
                id="title"
                name="title"
                placeholder="예: 다시 가고 싶은 연남동 파스타집"
                required
              />
            </div>
            <div class="col-12">
              <label class="form-label" for="placeQuery">장소 검색</label>
              <div class="btn-group w-100 mb-2" role="group" aria-label="지도 선택">
                <input
                  class="btn-check"
                  type="radio"
                  name="mapProvider"
                  id="mapProviderNaver"
                  value="naver"
                  checked
                />
                <label class="btn btn-outline-success" for="mapProviderNaver">
                  네이버 지도
                </label>
                <input
                  class="btn-check"
                  type="radio"
                  name="mapProvider"
                  id="mapProviderKakao"
                  value="kakao"
                />
                <label class="btn btn-outline-success" for="mapProviderKakao">
                  카카오 지도
                </label>
              </div>
              <div class="input-group">
                <input
                  class="form-control"
                  id="placeQuery"
                  placeholder="도로명·지번 주소나 상호명으로 검색"
                />
                <button
                  class="btn btn-outline-success"
                  type="button"
                  id="placeSearchBtn"
                >
                  검색
                </button>
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  id="currentLocationBtn"
                >
                  현재 위치
                </button>
              </div>
              <div class="list-group place-results mt-2 d-none" id="placeResults"></div>
              <div class="border rounded-3 mt-2 d-none" id="placeMap"></div>
              <p class="form-text mb-0" id="placeHint"></p>
            </div>
            <div class="col-12">
              <label class="form-label" for="restaurantName">상호명</label>
              <input
                class="form-control"
                id="restaurantName"
                name="restaurantName"
                placeholder="예: 딜리셔스 키친"
                required
              />
            </div>
            <div class="col-12">
              <label class="form-label" for="content">리뷰</label>
              <textarea
                class="form-control"
                id="content"
                name="content"
                rows="9"
                placeholder="음식, 분위기, 가격, 다시 방문하고 싶은 이유를 남겨주세요."
                required
              ></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-success btn-lg" type="submit">저장</button>
            <a class="btn btn-outline-secondary btn-lg" href="./index.html">
              취소
            </a>
          </div>
        </form>
      </section>
    </main>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <script type="module" src="./js/write.js"></script>
  </body>
</html>
