<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delicious | 맛집 리뷰</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <nav class="site-nav sticky-top border-bottom">
      <div class="container nav-inner">
        <a class="navbar-brand fw-bold" href="./index.html">Delicious</a>
        <div class="nav-actions">
          <a class="nav-link" data-write-link href="./login.html">리뷰 쓰기</a>
          <a class="nav-link" data-auth-link href="./login.html">로그인</a>
          <a class="btn btn-success btn-sm" data-auth-link href="./signup.html">
            회원가입
          </a>
          <button
            class="btn btn-outline-secondary btn-sm d-none"
            data-logout-button
            type="button"
          >
            로그아웃
          </button>
        </div>
      </div>
    </nav>

    <main class="container">
      <section class="hero">
        <div>
          <span class="status-pill mb-3 d-none" id="sessionText"></span>
          <h1>오늘의 맛집을 기록하세요</h1>
          <p class="hero-copy mt-3">
            내 맛집이 모두의 맛집으로! 집단味성을 만들어 갑니다!
          </p>
          <div class="hero-actions">
            <a class="btn btn-success btn-lg" data-write-link href="./login.html">
              리뷰 쓰기
            </a>
          </div>
        </div>
        <div class="hero-photo" aria-hidden="true"></div>
      </section>

      <section class="pb-5">
        <div class="section-head">
          <div>
            <h2>최근 리뷰</h2>
          </div>
          <button class="btn btn-outline-dark btn-sm" id="refreshButton">
            새로고침
          </button>
        </div>
        <div class="review-grid" id="reviewsList"></div>
      </section>
    </main>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <script type="module" src="./js/feed.js"></script>
  </body>
</html>
