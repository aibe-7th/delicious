<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delicious | 회원가입</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-panel">
        <a class="brand-link" href="./index.html">Delicious</a>
        <h1>회원가입</h1>
        <form id="signupForm" class="vstack gap-3">
          <input
            class="form-control form-control-lg"
            name="email"
            type="email"
            placeholder="이메일"
            required
          />
          <input
            class="form-control form-control-lg"
            name="password"
            type="password"
            minlength="6"
            placeholder="비밀번호"
            required
          />
          <button class="btn btn-success btn-lg" type="submit">가입하기</button>
        </form>
        <div class="auth-notice d-none" id="verifyNotice">
          <h2 id="verifyTitle"></h2>
          <p id="verifyDescription"></p>
          <a class="btn btn-dark w-100" id="verifyLoginLink" href="./login.html"></a>
        </div>
        <a class="sub-link" href="./login.html">이미 계정이 있어요</a>
      </section>
    </main>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <script type="module" src="./js/signup.js"></script>
  </body>
</html>
